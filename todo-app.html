<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #fffdf7;
      --accent: #ff6b35;
      --accent2: #ff8c5a;
      --dark: #1a1a2e;
      --text: #1a1a2e;
      --muted: #888;
      --done: #c5c0b4;
      --border: #e0d9cc;
      --green: #2ecc71;
      --shadow: 0 4px 20px rgba(26,26,46,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease forwards;
    }

    .header-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(255,107,53,0.1);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    /* MAIN CARD */
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* STATS BAR */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      text-align: center;
      padding: 0.8rem;
      background: var(--bg);
      border-radius: 12px;
    }

    .stat-num {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.2rem;
      display: block;
    }

    /* INPUT */
    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .task-input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input::placeholder { color: var(--done); }
    .task-input:focus { border-color: var(--accent); }

    .add-btn {
      padding: 0.85rem 1.4rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }

    .add-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .add-btn:active { transform: scale(0.97); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* TASK LIST */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      min-height: 80px;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--done);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    /* TASK ITEM */
    .task-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1rem;
      background: var(--bg);
      border-radius: 12px;
      border: 1.5px solid transparent;
      transition: all 0.25s;
      animation: slideIn 0.3s ease forwards;
      cursor: default;
    }

    .task-item:hover { border-color: var(--border); background: var(--surface); }
    .task-item.done { opacity: 0.55; }

    /* CHECKBOX */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      transition: all 0.2s;
      color:white;
    }

    .check-btn:hover { border-color: var(--green); }
    .task-item.done .check-btn { background: var(--green); border-color: var(--green); }

    /* TASK TEXT */
    .task-text {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      word-break: break-word;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done);
    }

    /* PRIORITY TAG */
    .priority-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .priority-high { background: rgba(255,107,53,0.15); color: var(--accent); }
    .priority-medium { background: rgba(255,193,7,0.15); color: #d4a017; }
    .priority-low { background: rgba(46,204,113,0.15); color: #27ae60; }

    /* DELETE BTN */
    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--done);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { background: rgba(255,107,53,0.1); color: var(--accent); }

    /* PRIORITY SELECTOR */
    .priority-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      align-items: center;
    }

    .priority-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 0.3rem;
    }

    .prio-btn {
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .prio-btn.selected-high { background: rgba(255,107,53,0.15); border-color: var(--accent); color: var(--accent); }
    .prio-btn.selected-medium { background: rgba(255,193,7,0.15); border-color: #d4a017; color: #d4a017; }
    .prio-btn.selected-low { background: rgba(46,204,113,0.15); border-color: #27ae60; color: #27ae60; }

    /* CLEAR BTN */
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }

    .tasks-left {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .clear-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: var(--accent); }

    /* PROGRESS BAR */
    .progress-wrap {
      margin-bottom: 1.5rem;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* CREDIT */
    .credit {
      margin-top: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--done);
      text-align: center;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .credit span { color: var(--accent); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">✦ productivity tool</div>
    <h1>Task<span>Flow</span></h1>
    <p class="subtitle">// stay focused. get things done.</p>
  </div>

  <div class="card">

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="activeCount">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap">
      <div class="progress-top">
        <span>Progress</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-row">
      <input class="task-input" id="taskInput" type="text" placeholder="Add a new task..." maxlength="80"/>
      <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <!-- PRIORITY -->
    <div class="priority-row">
      <span class="priority-label">Priority:</span>
      <button class="prio-btn selected-high" id="prio-high" onclick="setPriority('high')">High</button>
      <button class="prio-btn" id="prio-medium" onclick="setPriority('medium')">Med</button>
      <button class="prio-btn" id="prio-low" onclick="setPriority('low')">Low</button>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <!-- TASK LIST -->
    <div class="task-list" id="taskList"></div>

    <!-- FOOTER -->
    <div class="footer-row">
      <span class="tasks-left" id="tasksLeft">0 tasks remaining</span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>

  </div>

  <div class="credit">Built by <span>Farhana Akter Mim</span> · HTML CSS JavaScript</div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('taskflow') || '[]');
    let currentFilter = 'all';
    let currentPriority = 'high';

    function setPriority(p) {
      currentPriority = p;
      ['high','medium','low'].forEach(x => {
        const btn = document.getElementById('prio-' + x);
        btn.className = 'prio-btn';
        if (x === p) btn.classList.add('selected-' + x);
      });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      tasks.unshift({ id: Date.now(), text, done: false, priority: currentPriority });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function save() {
      localStorage.setItem('taskflow', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('taskList');
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const active = total - done;

      // Stats
      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('tasksLeft').textContent = active + ' task' + (active !== 1 ? 's' : '') + ' remaining';

      // Progress
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';

      // Filter
      let filtered = tasks;
      if (currentFilter === 'active') filtered = tasks.filter(t => !t.done);
      if (currentFilter === 'done') filtered = tasks.filter(t => t.done);

      if (filtered.length === 0) {
        const msgs = { all: '✦ No tasks yet. Add one above!', active: '✦ All tasks completed!', done: '✦ No completed tasks yet.' };
        list.innerHTML = `<div class="empty-state"><span class="empty-icon">📋</span>${msgs[currentFilter]}</div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <button class="check-btn" onclick="toggleTask(${t.id})" title="Mark complete">
            ${t.done ? '✓' : ''}
          </button>
          <span class="task-text">${escHtml(t.text)}</span>
          <span class="priority-tag priority-${t.priority}">${t.priority}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Enter key to add
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // Load some starter tasks
    if (tasks.length === 0) {
      tasks = [
        { id: 1, text: 'Upload portfolio to GitHub', done: true, priority: 'high' },
        { id: 2, text: 'Add profile picture to GitHub', done: true, priority: 'medium' },
        { id: 3, text: 'Build To-Do List app', done: false, priority: 'high' },
        { id: 4, text: 'JavaScript', done: false, priority: 'medium' },
        { id: 5, text: 'Add LinkedIn to portfolio', done: false, priority: 'low' },
      ];
      save();
    }

    render();
  </script>

</body>
</html>
